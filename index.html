<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>英単語帳</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; position: relative; }
    .word { font-size: 34px; font-weight: bold; margin: 20px 0; color: #0b6efd; }
    input, button { width: 100%; padding: 12px; font-size: 16px; border-radius: 10px; margin-top: 8px; box-sizing: border-box; }
    button { border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .primary { background: #0b6efd; color: white; }
    .ghost { background: #eee; color: #333; }
    .warn { background: #ffc107; color: black; }
    .shuffle { background: #ff9800; color: white; }
    .result { margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; min-height: 24px; white-space: pre-wrap; }
    .ok { background: #e8f5e9; color: green; border: 2px solid green; }
    .ng { background: #ffebee; color: red; border: 2px solid red; }
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b6efd; color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
    .login-content { width: 85%; max-width: 350px; }
    .logout-btn { position: absolute; top: 10px; right: 10px; width: auto; font-size: 10px; padding: 5px 10px; background: none; color: #ccc; }
    .error-msg { font-size: 12px; color: #d32f2f; background: #fff1f0; padding: 8px; border-radius: 5px; margin-top: 10px; text-align: left; border: 1px solid #ffa39e; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-content">
    <h2>ようこそ!</h2>
    <p>パスワードを入力してください(APIキー)</p>
    <input type="password" id="keyInput" placeholder="sk-or-v1-..." style="color: black; text-align: center;">
    <button class="ghost" onclick="login()" style="margin-top: 20px;">スタート！</button>
  </div>
</div>

<div class="card">
  <button class="logout-btn" onclick="logout()">合言葉リセット</button>
  
  <h3>単語帳CSVを選択</h3>
  <input type="file" id="csvFile" accept=".csv">
  <div class="word" id="word">ファイルを読み込んでください</div>
  
  <button class="ghost" onclick="speak()" style="width: auto; padding: 5px 20px; margin-bottom: 10px;">🔊 発音を聞く</button>

  <input type="text" id="answer" placeholder="答えを入力（空でEnterなら答えを表示）" onkeydown="handleKeyDown(event)">

  <button class="primary" id="checkBtn" onclick="checkAnswer()">AI判定</button>
  <button class="warn" onclick="giveUp()">わからない（答えを見る）</button>
  <button class="ghost" onclick="nextWord()">次へ</button>
  <button class="shuffle" onclick="shuffleWords()">シャッフルして開始</button>

  <div id="result" class="result"></div>
</div>

<script>
let words = [];
let index = 0;
let isAnswerShown = false;

window.onload = function() {
  if (localStorage.getItem("user_api_key")) {
    document.getElementById("loginScreen").style.display = "none";
  }
};

function login() {
  const key = document.getElementById("keyInput").value.trim();
  if (key.includes("sk-")) {
    localStorage.setItem("user_api_key", key);
    document.getElementById("loginScreen").style.display = "none";
  } else {
    alert("APIキー（sk-...）を正しく入力してください。");
  }
}

function logout() {
  if(confirm("合言葉をリセットしますか？")) {
    localStorage.removeItem("user_api_key");
    location.reload();
  }
}

function speak() {
  const wordText = document.getElementById("word").textContent;
  if (!wordText || wordText.includes("読み込んで")) return;
  window.speechSynthesis.cancel();
  const uttr = new SpeechSynthesisUtterance(wordText);
  uttr.lang = 'en-US';
  window.speechSynthesis.speak(uttr);
}

function handleKeyDown(event) {
  if (event.key === 'Enter') {
    const userInput = document.getElementById("answer").value.trim();
    if (isAnswerShown) {
      nextWord(); 
    } else if (userInput === "") {
      giveUp(); 
    } else {
      checkAnswer(); 
    }
  }
}

document.getElementById("csvFile").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    let text = event.target.result;
    let lines = text.split(/\r?\n/);
    if (lines.length > 0) lines.shift(); // 1行目を削除

    words = lines.map(line => {
      if (!line.trim()) return null;
      const cols = line.split(",");
      if (cols.length >= 2) {
        return {
          en: cols[0].replace(/"/g,"").trim(),
          ja: cols[1].replace(/"/g,"").trim()
        };
      }
      return null;
    }).filter(w => w && w.en && w.ja);

    if(words.length > 0) { 
      index = 0; 
      showWord(); 
    }
  };
  reader.readAsText(file, "UTF-8");
});

function showWord(){
  document.getElementById("word").textContent = words[index].en;
  document.getElementById("answer").value = "";
  document.getElementById("result").textContent = "";
  document.getElementById("result").className = "result";
  isAnswerShown = false;
  document.getElementById("answer").focus();
}

function nextWord(){
  if(words.length === 0) return;
  index = (index + 1) % words.length;
  showWord();
}

function shuffleWords(){
  if(words.length === 0) return;
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  index = 0;
  showWord();
}

function giveUp() {
  if(words.length === 0) return;
  const resultDiv = document.getElementById("result");
  const word = words[index];
  resultDiv.innerHTML = `❌ 確認しましょう<br><small>模範解答: ${word.ja}</small>`;
  resultDiv.className = "result ng";
  isAnswerShown = true;
}

async function checkAnswer(){
  const apiKey = localStorage.getItem("user_api_key");
  const userInput = document.getElementById("answer").value.trim();
  
  if(words.length === 0 || !userInput) return;

  const resultDiv = document.getElementById("result");
  const checkBtn = document.getElementById("checkBtn");
  const word = words[index];
  
  resultDiv.textContent = "AIが判定中...";
  resultDiv.className = "result";
  checkBtn.disabled = true;

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        "model": "google/gemma-3n-e4b-it:free", 
        "messages": [{ 
          "role": "user", 
          "content": `英単語「${word.en}」の日本語訳を判定してください。
正解の例:「${word.ja}」
ユーザーの回答:「${userInput}」

ルール　
・ユーザーの回答が正解例と意味がほぼ同じならOK。
・全く違う場合のみNG。
・助詞はなくてもいいとする
解説不要。OKかNGのどちらか1語のみ返してください。` 
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const aiResponse = data.choices[0].message.content.trim().toUpperCase();

    if(aiResponse.includes("OK")){
      resultDiv.innerHTML = `⭕ 正解！<br><small style="color:#666;">模範解答: ${word.ja}</small>`;
      resultDiv.className = "result ok";
    } else {
      resultDiv.innerHTML = `❌ 不正解<br><small>正解例: ${word.ja}</small>`;
      resultDiv.className = "result ng";
    }
    isAnswerShown = true;

  } catch(e) {
    resultDiv.innerHTML = `<div class="error-msg">⚠️ エラー: ${e.message}</div>`;
  } finally {
    checkBtn.disabled = false;
  }
}
</script>
</body>
</html>
